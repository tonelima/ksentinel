services:
  postgres:
    image: postgres:16-alpine
    container_name: ksentinel-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: api_ksentinel
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d api_ksentinel"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ksentinel-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: api-ksentinel:latest
    container_name: ksentinel-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/api_ksentinel
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JASYPT_PASSWORD: ${JASYPT_PASSWORD}
      MONITORING_SECURITY_USERNAME: ${APP_USERNAME}
      MONITORING_SECURITY_PASSWORD: ${APP_PASSWORD}
      SPRING_MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      SPRING_MAIL_PORT: ${MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: true
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: true
      MONITORING_SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      JAVA_OPTS: ${JAVA_OPTS:--Xms256m -Xmx512m -XX:+UseContainerSupport}
    ports:
      - "${APP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u ${APP_USERNAME}:${APP_PASSWORD} http://localhost:8080/api/dashboard || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ksentinel-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  ksentinel-net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
