services:

  postgres:
    image: postgres:16-alpine
    container_name: api-ksentinel-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: api_ksentinel
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d api_ksentinel"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - api-ksentinel-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: api-ksentinel:latest
    container_name: api-ksentinel-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/api_ksentinel
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}

      # Security
      JASYPT_PASSWORD: ${JASYPT_PASSWORD:-changeme-in-production}
      SECURITY_JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-change-me}

      # Mail (optional)
      SPRING_MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      SPRING_MAIL_PORT: ${MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: true
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: true
      MANAGEMENT_HEALTH_MAIL_ENABLED: false

      # Slack (optional)
      MONITORING_SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}

      # JVM
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseContainerSupport"
    ports:
      - "${APP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - api-ksentinel-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: ${FRONTEND_CONTEXT:-../KSentinel-Web}
      dockerfile_inline: |
        FROM node:20-alpine AS builder
        WORKDIR /app
        COPY package*.json ./
        RUN npm ci
        COPY index.html postcss.config.js tailwind.config.js tsconfig.json tsconfig.node.json vite.config.ts ./
        COPY src ./src
        RUN npm run build

        FROM nginx:1.27-alpine
        COPY --from=builder /app/dist /usr/share/nginx/html
        RUN printf '%s\n' \
          'server {' \
          '  listen 80;' \
          '  server_name _;' \
          '  root /usr/share/nginx/html;' \
          '  index index.html;' \
          '' \
          '  location /api/ {' \
          '    proxy_pass http://app:8080;' \
          '    proxy_http_version 1.1;' \
          '    proxy_set_header Host $$host;' \
          '    proxy_set_header X-Real-IP $$remote_addr;' \
          '    proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;' \
          '    proxy_set_header X-Forwarded-Proto $$scheme;' \
          '  }' \
          '' \
          '  location / {' \
          '    try_files $$uri $$uri/ /index.html;' \
          '  }' \
          '}' \
          > /etc/nginx/conf.d/default.conf
    image: ksentinel-web:latest
    container_name: api-ksentinel-web
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - api-ksentinel-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  api-ksentinel-net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
