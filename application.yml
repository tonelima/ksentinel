spring:
  application:
    name: api-monitor

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

  datasource:
    url: jdbc:postgresql://localhost:5432/api_monitor
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

jasypt:
  encryptor:
    password: ${JASYPT_PASSWORD:changeme-in-production}
    algorithm: PBEWithMD5AndDES

monitoring:
  scheduler:
    thread-pool-size: 10
  default-timeout-seconds: 10
  alert:
    consecutive-failures-threshold: 3

security:
  jwt:
    secret: ${JWT_SECRET:${JASYPT_PASSWORD:change-this-secret}}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}

resilience4j:
  circuitbreaker:
    instances:
      monitoringJob:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false

logging:
  level:
    com.konstroi.ksentinel: DEBUG
    org.springframework.scheduling: INFO
